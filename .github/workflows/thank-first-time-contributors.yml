name: Thank Contributors
on:
  pull_request:
    types:
      - closed
permissions:
  pull-requests: write
  issues: write
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  thank-contributor:
    if: github.event.pull_request.merged && github.event.pull_request.state == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Post thank you comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const author = context.payload.pull_request.user.login;

            const mergedPRs = await github.paginate(github.rest.pulls.list, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'closed',
            });

            const authorMergedPRs = mergedPRs.filter(
              pr => pr.user.login === author && pr.merged_at !== null
            );

            const isFirstContribution = authorMergedPRs.length === 1;

            const message = isFirstContribution
              ? `hey @${author}, really glad you took the time to contribute! your first PR just got merged and that genuinely means a lot to us 🎉\n\nhope this is just the beginning. feel free to pick up more issues whenever you're up for it, and if you're enjoying the project a ⭐ on the repo would be awesome`
              : `thanks @${author}, always good to see you back 🙌\n\nreally appreciate you keeping at it, means a lot. grab another issue whenever you feel like it and keep the good stuff coming`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: message
            });
